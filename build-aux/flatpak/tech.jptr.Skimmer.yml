---
app-id: tech.jptr.Skimmer
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: skimmer

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=session-bus
  - --talk-name=org.mpris.MediaPlayer2.*
  - --filesystem=home
  - --filesystem=/run/media

modules:
  - name: ffmpeg
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/ffmpeg/install.sh

  - name: skimmer
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation --no-deps .
      - install -Dm644 build-aux/data/tech.jptr.Skimmer.desktop /app/share/applications/tech.jptr.Skimmer.desktop
      - install -Dm644 build-aux/data/icons/tech.jptr.Skimmer.png /app/share/icons/hicolor/256x256/apps/tech.jptr.Skimmer.png
      - install -Dm644 build-aux/data/tech.jptr.Skimmer.metainfo.xml /app/share/metainfo/tech.jptr.Skimmer.metainfo.xml
    sources:
      - type: dir
        path: ../..
